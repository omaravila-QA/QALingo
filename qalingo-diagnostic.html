<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QALingo — Diagnostic Report</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--teal:#1aab98;--green:#7ec94a;--red:#e05555;--amber:#f0c040;--dark:#07090d;--d2:#0b0f16;--d3:#10161f;--card:#0f1520;--border:#1a2535;--text:#dde8f0;--muted:#5a7490;--white:#eef3f8}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;padding:32px 24px 80px;min-height:100vh}
.container{max-width:760px;margin:0 auto}

.header{text-align:center;margin-bottom:40px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:12px}
.logo .qa{color:var(--teal)}.logo .li{color:var(--green)}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--white);letter-spacing:-1px;margin-bottom:6px}
.subtitle{font-size:14px;color:var(--muted)}

.run-btn{
  display:block;width:100%;background:linear-gradient(135deg,var(--teal),#0f7a6e);
  color:#fff;border:none;border-radius:14px;padding:18px;
  font-family:'Syne',sans-serif;font-weight:800;font-size:16px;
  cursor:pointer;transition:all .2s;margin-bottom:32px;
  box-shadow:0 6px 24px rgba(26,171,152,.35);letter-spacing:.3px;
}
.run-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(26,171,152,.45)}
.run-btn:disabled{opacity:.5;cursor:default;transform:none}

.progress-wrap{background:var(--d3);border:1px solid var(--border);border-radius:10px;height:10px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:10px;transition:width .4s ease;width:0%}
.progress-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:24px;text-align:center}

.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.summary-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.summary-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px}
.summary-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px}

.section-h{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-h::after{content:'';flex:1;height:1px;background:var(--border)}

.checks{display:flex;flex-direction:column;gap:6px;margin-bottom:28px}
.check-row{
  display:flex;align-items:center;gap:14px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;transition:border-color .2s;
}
.check-row.pass{border-left:3px solid var(--green)}
.check-row.fail{border-left:3px solid var(--red)}
.check-row.warn{border-left:3px solid var(--amber)}
.check-row.pending{border-left:3px solid var(--border)}
.check-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.check-info{flex:1}
.check-name{font-size:13px;color:var(--white);font-weight:500}
.check-detail{font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace}
.check-badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:5px;flex-shrink:0;letter-spacing:.5px}
.badge-pass{background:rgba(126,201,74,.12);color:var(--green)}
.badge-fail{background:rgba(224,85,85,.1);color:var(--red)}
.badge-warn{background:rgba(240,192,64,.1);color:var(--amber)}
.badge-pending{background:var(--d3);color:var(--muted)}

.recommendation{background:var(--d3);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:8px}
.rec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--white);margin-bottom:4px}
.rec-desc{font-size:12px;color:var(--muted);line-height:1.5}
.rec-priority{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;display:inline-block;margin-top:6px}
.pri-high{background:rgba(224,85,85,.1);color:var(--red)}
.pri-med{background:rgba(240,192,64,.1);color:var(--amber)}
.pri-low{background:rgba(126,201,74,.1);color:var(--green)}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.watson-footer{text-align:center;padding:28px;border-top:1px solid var(--border);margin-top:16px;font-family:'DM Sans',sans-serif;font-style:italic;font-size:14px;color:var(--teal)}
</style>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MT2434NEM0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-MT2434NEM0');
</script>
<!-- Loops.so -->
<script src="https://cdn.loops.so/js/loops.js" data-token="cmnnvkoy709kp0i1s3jbsdcjs" async></script>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo"><span class="qa">QA</span><span class="li">Lingo</span></div>
    <h1>Landing Page Diagnostic</h1>
    <p class="subtitle">Automated QA report — checks all features, links, and interactions</p>
  </div>

  <button class="run-btn" id="runBtn" onclick="runDiagnostic()">
    🔍 Run Full Diagnostic
  </button>

  <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">Ready to run diagnostic</div>

  <!-- SUMMARY -->
  <div class="summary-row" id="summaryRow" style="display:none">
    <div class="summary-box"><div class="summary-val" id="sumPass" style="color:var(--green)">0</div><div class="summary-label">PASSED</div></div>
    <div class="summary-box"><div class="summary-val" id="sumFail" style="color:var(--red)">0</div><div class="summary-label">FAILED</div></div>
    <div class="summary-box"><div class="summary-val" id="sumWarn" style="color:var(--amber)">0</div><div class="summary-label">WARNINGS</div></div>
    <div class="summary-box"><div class="summary-val" id="sumScore" style="color:var(--teal)">-</div><div class="summary-label">HEALTH SCORE</div></div>
  </div>

  <!-- CHECK GROUPS -->
  <div id="resultsArea"></div>

  <!-- RECOMMENDATIONS -->
  <div id="recsArea"></div>

  <div class="watson-footer" id="watsonFooter" style="display:none"></div>

</div>

<script>
const TARGET = 'https://omaravila-qa.github.io/QALingo-/';

const CHECKS = [
  // GROUP: Core Pages
  { group:'Core Pages & Navigation', id:'landing', name:'Landing page loads', detail:'GET index.html → 200 OK', type:'fetch', url: TARGET },
  { group:'Core Pages & Navigation', id:'lesson', name:'Lesson app accessible', detail:'qalingo-lesson-app.html', type:'fetch', url: TARGET + 'qalingo-lesson-app.html' },
  { group:'Core Pages & Navigation', id:'exam', name:'ISTQB Simulator accessible', detail:'qalingo-istqb-simulator.html', type:'fetch', url: TARGET + 'qalingo-istqb-simulator.html' },
  { group:'Core Pages & Navigation', id:'interview', name:'Interview Prep accessible', detail:'qalingo-interview-prep.html', type:'fetch', url: TARGET + 'qalingo-interview-prep.html' },
  { group:'Core Pages & Navigation', id:'gamification', name:'Gamification dashboard accessible', detail:'qalingo-gamification.html', type:'fetch', url: TARGET + 'qalingo-gamification.html' },
  { group:'Core Pages & Navigation', id:'onboarding', name:'Onboarding flow accessible', detail:'qalingo-onboarding.html', type:'fetch', url: TARGET + 'qalingo-onboarding.html' },
  { group:'Core Pages & Navigation', id:'mascot', name:'Q mascot image loads', detail:'q-mascot.png', type:'fetch', url: TARGET + 'q-mascot.png' },

  // GROUP: Landing Page Content
  { group:'Landing Page Content', id:'theme_js', name:'Theme system in <head>', detail:'DARK_THEME & LIGHT_THEME declared before render', type:'content', url: TARGET, contains: 'THEME SYSTEM - runs immediately' },
  { group:'Landing Page Content', id:'challenge', name:'QA Challenge feature present', detail:'openChallenge() function', type:'content', url: TARGET, contains: 'openChallenge' },
  { group:'Landing Page Content', id:'quiz', name:'Mini quiz demo present', detail:'3-question quiz with Q feedback', type:'content', url: TARGET, contains: 'CH_QUESTIONS' },
  { group:'Landing Page Content', id:'flashcards', name:'Flashcard system present', detail:'FCS array with 20 terms', type:'content', url: TARGET, contains: 'function flipCard' },
  { group:'Landing Page Content', id:'iq', name:'Daily interview question present', detail:'IQS questions with Q feedback', type:'content', url: TARGET, contains: 'function subiq' },
  { group:'Landing Page Content', id:'faq', name:'FAQ section present', detail:'7 questions with accordion', type:'content', url: TARGET, contains: 'toggleFAQ' },
  { group:'Landing Page Content', id:'glossary', name:'Glossary with search present', detail:'30 QA terms', type:'content', url: TARGET, contains: 'filterGlossary' },
  { group:'Landing Page Content', id:'feedback', name:'Feedback buzón present', detail:'Suggestion box with type selector', type:'content', url: TARGET, contains: 'submitFeedback' },
  { group:'Landing Page Content', id:'creator', name:'Meet the Creator section', detail:'Omar A. bio present', type:'content', url: TARGET, contains: 'Omar A.' },
  { group:'Landing Page Content', id:'cache', name:'Cache-busting headers present', detail:'no-cache meta tags', type:'content', url: TARGET, contains: 'no-cache, no-store' },

  // GROUP: Email Validation
  { group:'Email Validation', id:'email_regex', name:'Email validation function present', detail:'isValid() with domain TLD check', type:'content', url: TARGET, contains: 'isValid' },
  { group:'Email Validation', id:'email_signup', name:'Signup handlers present', detail:'signup(1) and signup(2)', type:'content', url: TARGET, contains: 'function signup' },
  { group:'Email Validation', id:'success_screen', name:'QAlemental success screen present', detail:'Shows after valid email submitted', type:'content', url: TARGET, contains: 'QAlemental' },

  // GROUP: Navigation
  { group:'Navigation & UX', id:'bottom_nav', name:'Bottom navigation bar present', detail:'Links to all 6 modules', type:'content', url: TARGET, contains: 'class="bnav"' },
  { group:'Navigation & UX', id:'back_btn_lesson', name:'Back to Main Menu in lesson app', detail:'← Main Menu button', type:'content', url: TARGET + 'qalingo-lesson-app.html', contains: 'back-home' },
  { group:'Navigation & UX', id:'back_btn_exam', name:'Back to Main Menu in exam simulator', detail:'← Main Menu button', type:'content', url: TARGET + 'qalingo-istqb-simulator.html', contains: 'back-home' },
  { group:'Navigation & UX', id:'back_btn_interview', name:'Back to Main Menu in interview prep', detail:'← Main Menu button', type:'content', url: TARGET + 'qalingo-interview-prep.html', contains: 'back-home' },
  { group:'Navigation & UX', id:'magnifier', name:'Magnifying glass cursor present', detail:'SVG cursor on hover', type:'content', url: TARGET, contains: 'MAGNIFYING GLASS' },
  { group:'Navigation & UX', id:'dark_light', name:'Dark/light toggle present', detail:'toggleTheme() function', type:'content', url: TARGET, contains: 'function toggleTheme' },

  // GROUP: ISTQB Simulator
  { group:'ISTQB Exam Simulator', id:'questions40', name:'40 questions in simulator', detail:'Full CTFL v4.0 question bank', type:'content', url: TARGET + 'qalingo-istqb-simulator.html', contains: 'QUESTIONS.length' },
  { group:'ISTQB Exam Simulator', id:'timer', name:'60-minute timer present', detail:'Countdown from 3600 seconds', type:'content', url: TARGET + 'qalingo-istqb-simulator.html', contains: '3600' },
  { group:'ISTQB Exam Simulator', id:'report', name:'Exam report/results present', detail:'Chapter breakdown + review table', type:'content', url: TARGET + 'qalingo-istqb-simulator.html', contains: 'buildReport' },

  // GROUP: Interview Prep
  { group:'Interview Prep Module', id:'ai_feedback', name:'AI feedback integration', detail:'Claude API call in submitAnswer()', type:'content', url: TARGET + 'qalingo-interview-prep.html', contains: 'anthropic' },
  { group:'Interview Prep Module', id:'three_levels', name:'3 interview levels present', detail:'Junior, Mid-Level, Senior', type:'content', url: TARGET + 'qalingo-interview-prep.html', contains: 'senior' },
  { group:'Interview Prep Module', id:'sim_mode', name:'Simulation mode present', detail:'5-question timed simulation', type:'content', url: TARGET + 'qalingo-interview-prep.html', contains: 'startSim' },
];

let results = {};
let pageCache = {};

async function fetchPage(url) {
  if (pageCache[url]) return pageCache[url];
  try {
    const r = await fetch(url, { mode: 'cors', cache: 'no-store' });
    const text = await r.text();
    pageCache[url] = { ok: r.ok, status: r.status, text };
    return pageCache[url];
  } catch(e) {
    pageCache[url] = { ok: false, status: 0, text: '', error: e.message };
    return pageCache[url];
  }
}

async function runCheck(check) {
  if (check.type === 'fetch') {
    const res = await fetchPage(check.url);
    return {
      status: res.ok ? 'pass' : 'fail',
      detail: res.ok ? `HTTP ${res.status} OK` : `HTTP ${res.status} — ${res.error || 'Not found'}`
    };
  }
  if (check.type === 'content') {
    const res = await fetchPage(check.url);
    if (!res.ok) return { status: 'fail', detail: `Page not accessible (${res.status})` };
    const found = res.text.includes(check.contains);
    return {
      status: found ? 'pass' : 'fail',
      detail: found ? `"${check.contains.slice(0,30)}" found ✓` : `"${check.contains.slice(0,30)}" NOT found`
    };
  }
  return { status: 'warn', detail: 'Unknown check type' };
}

function renderCheck(check, result) {
  const icons = { pass:'✅', fail:'❌', warn:'⚠️', pending:'⏳' };
  const badges = { pass:'badge-pass', fail:'badge-fail', warn:'badge-warn', pending:'badge-pending' };
  const labels = { pass:'PASS', fail:'FAIL', warn:'WARN', pending:'...' };
  return `<div class="check-row ${result.status}" id="row-${check.id}">
    <div class="check-icon">${icons[result.status]}</div>
    <div class="check-info">
      <div class="check-name">${check.name}</div>
      <div class="check-detail">${result.detail || check.detail}</div>
    </div>
    <div class="check-badge ${badges[result.status]}">${labels[result.status]}</div>
  </div>`;
}

function groupChecks(checksArr) {
  const groups = {};
  checksArr.forEach(c => {
    if (!groups[c.group]) groups[c.group] = [];
    groups[c.group].push(c);
  });
  return groups;
}

async function runDiagnostic() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Running diagnostic...';
  document.getElementById('summaryRow').style.display = 'none';
  document.getElementById('recsArea').innerHTML = '';
  document.getElementById('watsonFooter').style.display = 'none';
  pageCache = {};

  // Build initial skeleton
  const groups = groupChecks(CHECKS);
  let html = '';
  for (const [group, checks] of Object.entries(groups)) {
    html += `<div class="section-h">${group}</div><div class="checks" id="group-${group.replace(/\s+/g,'-')}">`;
    checks.forEach(c => {
      html += renderCheck(c, { status:'pending', detail: c.detail });
    });
    html += '</div>';
  }
  document.getElementById('resultsArea').innerHTML = html;

  let passed = 0, failed = 0, warned = 0;

  for (let i = 0; i < CHECKS.length; i++) {
    const check = CHECKS[i];
    const pct = Math.round(((i+1)/CHECKS.length)*100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `Checking ${i+1}/${CHECKS.length}: ${check.name}`;

    const result = await runCheck(check);
    results[check.id] = result;

    // Update the row
    const row = document.getElementById(`row-${check.id}`);
    if (row) row.outerHTML = renderCheck(check, result);

    if (result.status === 'pass') passed++;
    else if (result.status === 'fail') failed++;
    else warned++;

    await new Promise(r => setTimeout(r, 80));
  }

  // Summary
  const score = Math.round((passed / CHECKS.length) * 100);
  document.getElementById('sumPass').textContent = passed;
  document.getElementById('sumFail').textContent = failed;
  document.getElementById('sumWarn').textContent = warned;
  document.getElementById('sumScore').textContent = score + '%';
  document.getElementById('sumScore').style.color = score >= 90 ? 'var(--green)' : score >= 70 ? 'var(--amber)' : 'var(--red)';
  document.getElementById('summaryRow').style.display = 'grid';

  // Recommendations
  const recs = [];
  if (!results['theme_js']?.status === 'pass') recs.push({ title:'Theme system not in <head>', desc:'Move DARK_THEME and LIGHT_THEME to a <script> tag in <head> to prevent theme flash.', priority:'high' });
  if (results['ai_feedback']?.status !== 'pass') recs.push({ title:'Claude API key not configured', desc:'The Interview Prep module uses the Anthropic API. Add your API key to the fetch header in submitAnswer() for live AI feedback.', priority:'med' });
  if (results['mascot']?.status !== 'pass') recs.push({ title:'Q mascot image not loading', desc:'Verify q-mascot.png is in the root of the QALingo- repo on GitHub. Check filename case sensitivity.', priority:'high' });
  if (failed === 0 && warned === 0) recs.push({ title:'All checks passed', desc:'QALingo landing page is fully operational. Ready to share with users.', priority:'low' });

  const recsHtml = recs.length ? `
    <div class="section-h" style="margin-top:8px">Recommendations</div>
    ${recs.map(r => `
      <div class="recommendation">
        <div class="rec-title">${r.title}</div>
        <div class="rec-desc">${r.desc}</div>
        <span class="rec-priority pri-${r.priority}">${r.priority.toUpperCase()} PRIORITY</span>
      </div>`).join('')}` : '';
  document.getElementById('recsArea').innerHTML = recsHtml;

  // Watson quote
  const watsonLines = {
    100: '"QAlemental. Every check passed. The case is airtight, Watson."',
    90: '"Nearly flawless. A few loose threads — but the investigation holds."',
    70: '"The case has gaps, Watson. Address the failures before going to trial."',
    0: '"This investigation needs more work. Back to the drawing board."'
  };
  const watsonKey = score === 100 ? 100 : score >= 90 ? 90 : score >= 70 ? 70 : 0;
  const footer = document.getElementById('watsonFooter');
  footer.textContent = watsonLines[watsonKey];
  footer.style.display = 'block';

  document.getElementById('progressLabel').textContent = `Diagnostic complete — ${passed} passed, ${failed} failed, ${warned} warnings`;
  btn.disabled = false;
  btn.innerHTML = '🔍 Run Again';
}
</script>
</body>
</html>
